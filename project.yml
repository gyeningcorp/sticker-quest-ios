name: StickerQuest
options:
  bundleIdPrefix: com.gyeningcorp
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "16"

targets:
  StickerQuest:
    type: application
    platform: iOS
    sources:
      - path: Sources/StickerQuest
      - path: Sources/StickerQuest/WebContent
        type: folder
    info:
      path: Sources/StickerQuest/Info.plist
      properties:
        CFBundleName: Sticker Quest
        CFBundleDisplayName: Sticker Quest
        CFBundleIdentifier: com.gyeningcorp.stickerquest
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundlePackageType: APPL
        CFBundleInfoDictionaryVersion: "6.0"
        LSRequiresIPhoneOS: true
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        ITSAppUsesNonExemptEncryption: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
    entitlements:
      path: Sources/StickerQuest/StickerQuest.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gyeningcorp.stickerquest
        MARKETING_VERSION: "1.2"
        CURRENT_PROJECT_VERSION: "2"
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "15.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 4LZJ7U5FHS
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: "NO"
